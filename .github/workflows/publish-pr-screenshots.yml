name: Publish PR screenshots

on:
  workflow_run:
    workflows: ["Update screenshots"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: publish-pr-screenshots
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Download screenshot preview
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-screenshots
          path: ${{ runner.temp }}/pr-screenshots
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish screenshot preview to the pull request
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SCREENSHOT_BRANCH: pr-screenshots
          SCREENSHOT_DIRECTORY: ${{ runner.temp }}/pr-screenshots
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs")
            const path = require("path")

            const workflowRun = context.payload.workflow_run
            const { owner, repo } = context.repo
            const branch = process.env.SCREENSHOT_BRANCH
            const directory = process.env.SCREENSHOT_DIRECTORY
            const runId = process.env.SOURCE_RUN_ID
            const marker = "<!-- nazboard-pr-screenshots -->"
            const files = [
              ["Overview", "screenshot-overview.png"],
              ["Pool", "screenshot-pool.png"],
              ["Dataset", "screenshot-dataset.png"],
            ]

            let pullNumber = workflowRun.pull_requests?.[0]?.number
            if (!pullNumber) {
              const headOwner = workflowRun.head_repository?.owner?.login
              if (!headOwner || !workflowRun.head_branch) {
                throw new Error("Unable to identify the pull request head")
              }

              const candidates = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                head: `${headOwner}:${workflowRun.head_branch}`,
                per_page: 100,
              })
              const matchingCandidates = candidates.filter(
                (pull) =>
                  pull.head.sha === workflowRun.head_sha ||
                  pull.merge_commit_sha === workflowRun.head_sha
              )
              const candidate =
                matchingCandidates.length === 1
                  ? matchingCandidates[0]
                  : candidates.length === 1
                    ? candidates[0]
                    : null
              pullNumber = candidate?.number
            }

            if (!Number.isInteger(pullNumber) || pullNumber < 1) {
              throw new Error("Unable to resolve exactly one pull request")
            }

            const pngHeader = "89504e470d0a1a0a"
            const screenshots = files.map(([label, filename]) => {
              const contents = fs.readFileSync(path.join(directory, filename))
              if (
                contents.length > 2 * 1024 * 1024 ||
                contents.subarray(0, 8).toString("hex") !== pngHeader
              ) {
                throw new Error(`${filename} is not a valid bounded PNG`)
              }
              return { label, filename, contents }
            })

            let parentCommit = null
            let baseTree = null
            try {
              const currentRef = await github.rest.git.getRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              })
              parentCommit = currentRef.data.object.sha
              const currentCommit = await github.rest.git.getCommit({
                owner,
                repo,
                commit_sha: parentCommit,
              })
              baseTree = currentCommit.data.tree.sha
            } catch (error) {
              if (error.status !== 404) throw error
            }

            const treeEntries = []
            for (const screenshot of screenshots) {
              const blob = await github.rest.git.createBlob({
                owner,
                repo,
                content: screenshot.contents.toString("base64"),
                encoding: "base64",
              })
              treeEntries.push({
                path: `pr-${pullNumber}/${screenshot.filename}`,
                mode: "100644",
                type: "blob",
                sha: blob.data.sha,
              })
            }

            const tree = await github.rest.git.createTree({
              owner,
              repo,
              tree: treeEntries,
              ...(baseTree ? { base_tree: baseTree } : {}),
            })
            const commit = await github.rest.git.createCommit({
              owner,
              repo,
              message: `Update screenshots for PR #${pullNumber}`,
              tree: tree.data.sha,
              parents: parentCommit ? [parentCommit] : [],
            })

            if (parentCommit) {
              await github.rest.git.updateRef({
                owner,
                repo,
                ref: `heads/${branch}`,
                sha: commit.data.sha,
              })
            } else {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${branch}`,
                sha: commit.data.sha,
              })
            }

            const sourceRunUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`
            const imageUrl = (filename) =>
              `https://github.com/${owner}/${repo}/blob/${branch}/pr-${pullNumber}/${filename}?raw=1&run=${runId}`
            const body = [
              marker,
              "## UI screenshots",
              "",
              `Generated from \`${workflowRun.head_sha.slice(0, 7)}\` by [this workflow run](${sourceRunUrl}).`,
              "",
              ...screenshots.flatMap((screenshot) => [
                `### ${screenshot.label}`,
                "",
                `![${screenshot.label} screenshot](${imageUrl(screenshot.filename)})`,
                "",
              ]),
            ].join("\n")

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pullNumber, per_page: 100 }
            )
            const previousComment = comments.find(
              (comment) =>
                comment.user?.login === "github-actions[bot]" &&
                comment.body?.includes(marker)
            )

            if (previousComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previousComment.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body,
              })
            }
