name: Update screenshots

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/update-screenshot.yml"
      - ".github/workflows/publish-pr-screenshots.yml"
      - "index.html"
      - "package*.json"
      - "scripts/capture-screenshots.sh"
      - "server/**"
      - "shared/**"
      - "src/**"
      - "tests/*.txt"
      - "tsconfig*.json"
      - "vite.config.ts"
  pull_request:
    paths:
      - ".github/workflows/update-screenshot.yml"
      - ".github/workflows/publish-pr-screenshots.yml"
      - "index.html"
      - "package*.json"
      - "scripts/capture-screenshots.sh"
      - "server/**"
      - "shared/**"
      - "src/**"
      - "tests/*.txt"
      - "tsconfig*.json"
      - "vite.config.ts"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Check and build
        run: npm run check
      - name: Capture screenshots
        run: ./scripts/capture-screenshots.sh
      - name: Prepare screenshot preview
        run: |
          mkdir -p "$RUNNER_TEMP/pr-screenshots"
          cp docs/screenshot-*.png "$RUNNER_TEMP/pr-screenshots/"
      - name: Upload screenshot preview
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-screenshots
          path: ${{ runner.temp }}/pr-screenshots
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  update:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Check and build
        run: npm run check
      - name: Capture screenshots
        run: ./scripts/capture-screenshots.sh
      - name: Commit screenshots
        run: |
          if git diff --quiet -- docs/screenshot-*.png; then
            echo "The screenshots are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/screenshot-*.png
          git commit -m "Update screenshots"
          git push
