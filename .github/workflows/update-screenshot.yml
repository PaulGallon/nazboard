name: Update screenshots

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/update-screenshot.yml"
      - "index.html"
      - "package*.json"
      - "scripts/capture-screenshots.sh"
      - "server/**"
      - "shared/**"
      - "src/**"
      - "tests/*.txt"
      - "tsconfig*.json"
      - "vite.config.ts"
  pull_request:
    paths:
      - ".github/workflows/update-screenshot.yml"
      - "index.html"
      - "package*.json"
      - "scripts/capture-screenshots.sh"
      - "server/**"
      - "shared/**"
      - "src/**"
      - "tests/*.txt"
      - "tsconfig*.json"
      - "vite.config.ts"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Check and build
        run: npm run check
      - name: Capture screenshots
        run: ./scripts/capture-screenshots.sh
      - name: Verify screenshots
        run: git diff --exit-code -- docs/screenshot-*.png

  update:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Check and build
        run: npm run check
      - name: Capture screenshots
        run: ./scripts/capture-screenshots.sh
      - name: Commit screenshots
        run: |
          if git diff --quiet -- docs/screenshot-*.png; then
            echo "The screenshots are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/screenshot-*.png
          git commit -m "Update screenshots"
          git push
